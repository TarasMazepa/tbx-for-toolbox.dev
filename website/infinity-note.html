<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>infinity note</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --muted-color: #64748b;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
            --mono-family: 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 2rem max(2rem, calc(15vw - 5rem));
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .title {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            color: var(--accent-color);
        }

        .status {
            font-size: 0.875rem;
            color: var(--muted-color);
            transition: opacity 0.3s ease;
        }

        .status.saving {
            opacity: 1;
            color: var(--accent-color);
        }

        .container {
            width: 100%;
            flex-grow: 1;
            position: relative;
        }

        #backdrop, #notes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            font-family: var(--mono-family);
            font-size: 1.1rem;
            line-height: 1.6;
            padding: 1rem;
            box-sizing: border-box;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--muted-color) transparent;
        }

        #backdrop {
            z-index: 1;
            color: transparent;
            pointer-events: none;
            scrollbar-width: none; /* Hide scrollbar in Firefox */
        }

        /* Hide scrollbar on backdrop so it doesn't double up with notes */
        #backdrop::-webkit-scrollbar {
            width: 6px;
            display: none; /* Hide scrollbar in webkit browsers */
        }
        #backdrop::-webkit-scrollbar-thumb {
            background-color: transparent;
        }

        #notes {
            z-index: 2;
            background: transparent;
            color: var(--text-color);
            resize: none;
        }

        #notes::placeholder {
            color: var(--muted-color);
            opacity: 0.5;
        }

        #notes::-webkit-scrollbar {
            width: 6px;
        }

        #notes::-webkit-scrollbar-thumb {
            background-color: var(--muted-color);
            border-radius: 10px;
        }

        /* Line styles for backdrop */
        .line {
            position: relative;
            min-height: 1.6em;
            width: fit-content;
            max-width: 100%;
            border-radius: 4px;
            pointer-events: none;
        }

        .line::before {
            content: '';
            position: absolute;
            top: 2px;
            bottom: 2px;
            left: -4px;
            right: -4px;
            background-color: rgba(56, 189, 248, 0.1); /* very subtle accent color */
            border-radius: 4px;
            z-index: -1;
            transition: opacity 0.2s ease;
        }

        /* Empty lines are invisible unless active */
        .line.empty::before {
            opacity: 0;
        }

        .line.empty.active::before {
            opacity: 1;
            background-color: rgba(56, 189, 248, 0.2);
        }

        .hint {
            position: fixed;
            bottom: 2rem;
            font-size: 0.75rem;
            color: var(--muted-color);
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">infinity note</div>
        <div id="status" class="status">All changes saved.</div>
    </div>

    <div class="container">
        <div id="backdrop"></div>
        <textarea id="notes" placeholder="Start typing... Press Enter to push content down."></textarea>
    </div>

    <div class="hint">Press Enter to insert a new line at the top of the current block. Shift+Enter for regular new line.</div>

    <script>
        const notesArea = document.getElementById('notes');
        const statusEl = document.getElementById('status');
        let saveTimeout;

        // Load content
        const savedContent = localStorage.getItem('infinity_notes');
        if (savedContent) {
            notesArea.value = savedContent;
        }

        // Auto-save logic
        function saveContent() {
            localStorage.setItem('infinity_notes', notesArea.value);
            statusEl.textContent = 'All changes saved.';
            statusEl.classList.remove('saving');
        }

        notesArea.addEventListener('input', () => {
            statusEl.textContent = 'Saving...';
            statusEl.classList.add('saving');
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveContent, 500);
        });

        function getLineBoundaries(value, start, end) {
            let firstLineStart = value.lastIndexOf('\n', start - 1);
            firstLineStart = firstLineStart === -1 ? 0 : firstLineStart + 1;

            let lastLineEnd = value.indexOf('\n', end);
            if (end > start && value[end - 1] === '\n') {
                lastLineEnd = end - 1;
            } else {
                lastLineEnd = lastLineEnd === -1 ? value.length : lastLineEnd;
            }
            return { firstLineStart, lastLineEnd };
        }

        function moveLinesUp(notesArea) {
            const value = notesArea.value;
            const start = notesArea.selectionStart;
            const end = notesArea.selectionEnd;

            const { firstLineStart, lastLineEnd } = getLineBoundaries(value, start, end);

            if (firstLineStart === 0) return;

            let prevLineStart = value.lastIndexOf('\n', firstLineStart - 2);
            prevLineStart = prevLineStart === -1 ? 0 : prevLineStart + 1;

            const beforePrev = value.slice(0, prevLineStart);
            const prevLine = value.slice(prevLineStart, firstLineStart - 1);
            const selectedLines = value.slice(firstLineStart, lastLineEnd);
            const afterSelected = value.slice(lastLineEnd);

            notesArea.value = beforePrev + selectedLines + '\n' + prevLine + afterSelected;

            notesArea.selectionStart = prevLineStart + (start - firstLineStart);
            notesArea.selectionEnd = prevLineStart + (end - firstLineStart);
            notesArea.dispatchEvent(new Event('input'));
        }

        function moveLinesDown(notesArea) {
            const value = notesArea.value;
            const start = notesArea.selectionStart;
            const end = notesArea.selectionEnd;

            const { firstLineStart, lastLineEnd } = getLineBoundaries(value, start, end);

            if (lastLineEnd === value.length) return;

            let nextLineEnd = value.indexOf('\n', lastLineEnd + 1);
            nextLineEnd = nextLineEnd === -1 ? value.length : nextLineEnd;

            const beforeSelected = value.slice(0, firstLineStart);
            const selectedLines = value.slice(firstLineStart, lastLineEnd);
            const nextLine = value.slice(lastLineEnd + 1, nextLineEnd);
            const afterNext = value.slice(nextLineEnd);

            notesArea.value = beforeSelected + nextLine + '\n' + selectedLines + afterNext;

            const newSelectedStart = firstLineStart + nextLine.length + 1;
            notesArea.selectionStart = newSelectedStart + (start - firstLineStart);
            notesArea.selectionEnd = newSelectedStart + (end - firstLineStart);
            notesArea.dispatchEvent(new Event('input'));
        }

        // The "Quirk": Enter key behavior and Move lines
        notesArea.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.altKey && e.key === 'ArrowUp') {
                e.preventDefault();
                moveLinesUp(notesArea);
                return;
            }
            if (e.shiftKey && e.altKey && e.key === 'ArrowDown') {
                e.preventDefault();
                moveLinesDown(notesArea);
                return;
            }

            if (e.key === 'Enter') {
                if (e.shiftKey) {
                    return; // Allow default behavior for Shift+Enter
                }

                e.preventDefault();

                const start = notesArea.selectionStart;
                const value = notesArea.value;

                // Find the start of the current line
                let currentLineStart = value.lastIndexOf('\n', start - 1);
                
                // If lastIndexOf is -1, it means we're on the first line
                currentLineStart = currentLineStart === -1 ? 0 : currentLineStart + 1;

                // Insert newline at the beginning of the current line
                const newValue = value.slice(0, currentLineStart) + '\n' + value.slice(currentLineStart);
                notesArea.value = newValue;

                // Move cursor to the new line
                notesArea.selectionStart = notesArea.selectionEnd = currentLineStart;
                
                // Trigger auto-save
                notesArea.dispatchEvent(new Event('input'));
            }
        });

        // Backdrop logic
        const backdrop = document.getElementById('backdrop');

        function updateBackdrop() {
            const text = notesArea.value;
            const lines = text.split('\n');

            // Find which line the cursor is currently on
            const cursorPosition = notesArea.selectionStart;
            const textBeforeCursor = text.substring(0, cursorPosition);
            const currentLineIndex = textBeforeCursor.split('\n').length - 1;

            backdrop.innerHTML = lines.map((line, index) => {
                const isEmpty = line === '';
                const isActive = index === currentLineIndex;

                // Add an empty space to preserve height for empty lines
                let content = isEmpty ? ' ' : line;

                // Escape HTML to prevent injection, only if not empty
                if (!isEmpty) {
                    content = content.replace(/&/g, '&amp;')
                                     .replace(/</g, '&lt;')
                                     .replace(/>/g, '&gt;');
                }

                let classes = 'line';
                if (isEmpty) classes += ' empty';
                if (isActive) classes += ' active';

                return `<div class="${classes}">${content}</div>`;
            }).join('');

            // Sync scroll
            backdrop.scrollTop = notesArea.scrollTop;
            backdrop.scrollLeft = notesArea.scrollLeft;
        }

        ['input', 'keyup', 'click', 'focus', 'blur'].forEach(event => {
            notesArea.addEventListener(event, updateBackdrop);
        });

        notesArea.addEventListener('scroll', () => {
            backdrop.scrollTop = notesArea.scrollTop;
            backdrop.scrollLeft = notesArea.scrollLeft;
        });

        // Initial render
        updateBackdrop();

        // Initial focus
        notesArea.focus();
    </script>
</body>
</html>
