<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tbx | website</title>
    <style>
        :root {
            --bg-color: #1e1d27;
            --text-color: #eae8f2;
            --accent-color: #b294bb;
            --muted-color: #3b3946;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: -0.025em;
        }

        p {
            color: var(--muted-color);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
            display: block;
            text-align: left;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .card h2 {
            font-size: 1.25rem;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
        }

        .card p {
            margin-bottom: 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>tbx</h1>
        <p>A collection of experimental web tools and experiments.</p>
        
        <div class="links">
            <a href="infinity-note.html" class="card">
                <h2>infinity note</h2>
                <p>A minimal, auto-saving scratchpad with a top-down entry flow.</p>
            </a>
        </div>
    </div>
</body>
</html>
